[build]
  command = "yarn build"
  publish = "dist"

[dev]
  command = "yarn dev"
  targetPort = 5173
  port = 8888
  framework = "#custom"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[plugins]]
  package = "@netlify/plugin-local-install-core" # Ensures TS support in builds

# This is the magic part:
[hooks]
  pre-build = "npx ts-node scripts/seed-pinecone.ts"